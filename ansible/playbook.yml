---
- name: Configure KijaniKiosk servers
  hosts: kijanikiosk
  become: true
  become_method: sudo
  gather_facts: true

  vars:
    service_meta: "{{ service_definitions[service_name] }}"
    service_env_path: "{{ config_dir }}/{{ env_file_name }}"
    service_script_path: >-
      {% if service_name == 'kk-api' %}{{ service_dir }}/server.js{% elif service_name == 'kk-payments' %}{{ service_dir }}/run-payments.sh{% else %}{{ service_dir }}/run-logs.sh{% endif %}

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart journald
      ansible.builtin.systemd:
        name: systemd-journald
        state: restarted

    - name: Restart service
      ansible.builtin.systemd:
        name: "{{ service_name }}.service"
        state: restarted
      when: service_name is defined

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required packages
      ansible.builtin.apt:
        name: "{{ required_packages }}"
        state: present
        install_recommends: false

    - name: Create shared service group
      ansible.builtin.group:
        name: "{{ service_group }}"
        state: present
        system: true

    - name: Create primary service group
      ansible.builtin.group:
        name: "{{ service_owner }}"
        state: present
        system: true

    - name: Create service account
      ansible.builtin.user:
        name: "{{ service_owner }}"
        group: "{{ service_owner }}"
        groups: "{{ service_group }}"
        append: true
        system: true
        shell: /usr/sbin/nologin
        create_home: false
        comment: "KijaniKiosk {{ service_name }} service account"

    - name: Create application directory tree
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
      loop: "{{ common_directories + [{'path': service_dir, 'owner': service_owner, 'group': service_owner, 'mode': '0750'}] }}"

    - name: Grant service access to shared logs
      ansible.posix.acl:
        path: "{{ shared_log_dir }}"
        entity: "{{ service_owner }}"
        etype: user
        permissions: rwx
        state: present

    - name: Grant default shared log ACLs
      ansible.posix.acl:
        path: "{{ shared_log_dir }}"
        entity: "{{ service_owner }}"
        etype: user
        permissions: rwx
        default: true
        state: present

    - name: Deploy service environment file
      ansible.builtin.template:
        src: templates/envfile.j2
        dest: "{{ service_env_path }}"
        owner: root
        group: "{{ service_group }}"
        mode: "0640"
      notify:
        - Restart service

    - name: Deploy placeholder workload
      ansible.builtin.template:
        src: templates/service-script.j2
        dest: "{{ service_script_path }}"
        owner: "{{ service_owner }}"
        group: "{{ service_owner }}"
        mode: "0750"
      notify:
        - Restart service

    - name: Deploy hardened systemd unit file
      ansible.builtin.template:
        src: templates/service.unit.j2
        dest: "/etc/systemd/system/{{ service_name }}.service"
        owner: root
        group: root
        mode: "0644"
      notify:
        - Reload systemd
        - Restart service

    - name: Enable and start service
      ansible.builtin.systemd:
        name: "{{ service_name }}.service"
        enabled: true
        state: started
        daemon_reload: true

    - name: Set ufw default deny incoming
      community.general.ufw:
        state: enabled
        default: deny
        direction: incoming

    - name: Set ufw default allow outgoing
      community.general.ufw:
        default: allow
        direction: outgoing

    - name: Allow SSH
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: Allow HTTP
      community.general.ufw:
        rule: allow
        port: "80"
        proto: tcp

    - name: Allow service port on loopback only
      community.general.ufw:
        rule: allow
        port: "{{ service_port }}"
        proto: tcp
        src: 127.0.0.1

    - name: Create journald config directory
      ansible.builtin.file:
        path: /etc/systemd/journald.conf.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Create persistent journal directory
      ansible.builtin.file:
        path: "{{ journal_persistent_dir }}"
        state: directory
        owner: root
        group: systemd-journal
        mode: "0755"
      notify:
        - Restart journald

    - name: Configure persistent journald storage
      ansible.builtin.template:
        src: templates/journald-persistent.conf.j2
        dest: /etc/systemd/journald.conf.d/kijanikiosk.conf
        owner: root
        group: root
        mode: "0644"
      notify:
        - Restart journald

    - name: Deploy logrotate configuration
      ansible.builtin.template:
        src: templates/logrotate.j2
        dest: /etc/logrotate.d/kijanikiosk
        owner: root
        group: root
        mode: "0644"

    - name: Write deterministic health file
      ansible.builtin.template:
        src: templates/last-provision.json.j2
        dest: "{{ health_dir }}/last-provision.json"
        owner: "{{ service_owner }}"
        group: "{{ service_group }}"
        mode: "0640"
